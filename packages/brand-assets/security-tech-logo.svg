<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none">
  <defs>
    <linearGradient id="shieldStroke" x1="200" y1="40" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E4BB0"/>
      <stop offset="100%" stop-color="#1E3066"/>
    </linearGradient>
    <linearGradient id="towerMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00AEEF"/>
      <stop offset="100%" stop-color="#1E3066"/>
    </linearGradient>
    <linearGradient id="towerSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E4BB0"/>
      <stop offset="100%" stop-color="#1E3066"/>
    </linearGradient>
  </defs>

  <!-- Emblem: shield + buildings + circuit -->
  <g transform="translate(200 118)">
    <path d="M0 -58 L52 -34 V18 C52 42 0 62 0 62 C0 62 -52 42 -52 18 V-34 Z" fill="none" stroke="url(#shieldStroke)" stroke-width="5" stroke-linejoin="round"/>
    <!-- left tower -->
    <path d="M-38 8 L-22 0 L-22 32 L-38 38 Z" fill="url(#towerSide)"/>
    <!-- center tower -->
    <path d="M-14 -6 L14 -6 L14 34 L-14 34 Z" fill="url(#towerMain)"/>
    <g fill="#FFFFFF" opacity="0.95">
      <rect x="-10" y="2" width="5" height="5" rx="0.5"/>
      <rect x="-2" y="2" width="5" height="5" rx="0.5"/>
      <rect x="6" y="2" width="5" height="5" rx="0.5"/>
      <rect x="-10" y="12" width="5" height="5" rx="0.5"/>
      <rect x="-2" y="12" width="5" height="5" rx="0.5"/>
      <rect x="6" y="12" width="5" height="5" rx="0.5"/>
      <rect x="-10" y="22" width="5" height="5" rx="0.5"/>
      <rect x="-2" y="22" width="5" height="5" rx="0.5"/>
      <rect x="6" y="22" width="5" height="5" rx="0.5"/>
    </g>
    <!-- right tower -->
    <path d="M22 4 L38 10 L38 36 L22 30 Z" fill="url(#towerSide)"/>
    <!-- circuit base -->
    <path d="M-44 38 H44" stroke="#00AEEF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-44" cy="38" r="3.5" fill="#00AEEF"/>
    <circle cx="44" cy="38" r="3.5" fill="#00AEEF"/>
    <path d="M-30 38 L-30 48 M30 38 L30 48" stroke="#00AEEF" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-30" cy="48" r="2.5" fill="#00AEEF"/>
    <circle cx="30" cy="48" r="2.5" fill="#00AEEF"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="248" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="34" letter-spacing="1">
    <tspan fill="#1E3066">SECURITY </tspan><tspan fill="#00AEEF">TECH</tspan>
  </text>
  <text x="200" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="11" fill="#1E3066" letter-spacing="2.5">SMART SECURITY. BETTER LIVING.</text>

  <!-- Bottom feature icons -->
  <g transform="translate(200 340)" fill="#1E3066">
    <g transform="translate(-135 0)">
      <path d="M0 -14 L12 -6 V8 C12 14 0 20 0 20 C0 20 -12 14 -12 8 V-6 Z" fill="none" stroke="#1E3066" stroke-width="2"/>
      <text y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600">AN NINH</text>
    </g>
    <g transform="translate(-45 0)">
      <circle cx="-8" cy="-4" r="5"/><circle cx="8" cy="-4" r="5"/><circle cx="0" cy="-12" r="5"/>
      <path d="M-16 8 Q0 -2 16 8" fill="none" stroke="#1E3066" stroke-width="2"/>
      <text y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600">CŻ DÂN</text>
    </g>
    <g transform="translate(45 0)">
      <path d="M-10 6 H10 V-2 C10 -10 0 -12 0 -12 C0 -12 -10 -10 -10 -2 Z" fill="none" stroke="#1E3066" stroke-width="2"/>
      <circle cx="0" cy="-16" r="2" fill="#1E3066"/>
      <text y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600">TIĆN ÍCH</text>
    </g>
    <g transform="translate(135 0)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#1E3066" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#1E3066"/>
      <rect x="-1" y="-14" width="2" height="6" fill="#1E3066"/>
      <rect x="-1" y="8" width="2" height="6" fill="#1E3066"/>
      <rect x="-14" y="-1" width="6" height="2" fill="#1E3066"/>
      <rect x="8" y="-1" width="6" height="2" fill="#1E3066"/>
      <text y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600">V¬N HŔNH</text>
    </g>
  </g>
</svg>
